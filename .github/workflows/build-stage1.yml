name: Build + push stage1 (vanilla QEMU builder) to GHCR

# Builds the slow-to-rebuild "stage1" image — vanilla QEMU 11.0.0 fully
# compiled with /tmp/qemu-build/ intermediates retained. Pushed to
# ghcr.io/mattjackson/mos-qemu-stage1:<QEMU_VERSION> (and :latest).
#
# Dockerfile.patched then does `FROM ghcr.io/.../mos-qemu-stage1:11.0.0 AS
# builder` and skips the vanilla compile entirely — patched builds drop
# from ~16 min to ~30-60s.
#
# This workflow runs ONLY when:
#   - Dockerfile.stage1 is changed (apk deps, build flags, source pin)
#   - The workflow file itself is changed (typically a QEMU_VERSION bump)
#   - Manual workflow_dispatch (operator force-rebuild)
#
# Per the path-filter in build-image.yml, regular hw/** or pc-bios/**
# pushes do NOT trigger this workflow — they only trigger the fast
# patched build.

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.stage1'
      - '.github/workflows/build-stage1.yml'
  workflow_dispatch:
    inputs:
      qemu_version:
        description: 'QEMU version to build (default: 11.0.0)'
        type: string
        default: '11.0.0'

env:
  QEMU_VERSION: '11.0.0'
  REGISTRY: ghcr.io
  OWNER: mattjackson

permissions:
  contents: read
  packages: write

jobs:
  build-stage1:
    name: build mos-qemu-stage1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve QEMU_VERSION
        id: ver
        run: |
          # Prefer workflow_dispatch input, fall back to env default.
          input_ver="${{ github.event.inputs.qemu_version }}"
          ver="${input_ver:-${{ env.QEMU_VERSION }}}"
          echo "qemu_version=$ver" >> "$GITHUB_OUTPUT"
          echo "Building stage1 for QEMU $ver"

      - name: Build + push stage1 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.stage1
          push: true
          # Tag by version AND latest. Dockerfile.patched pins
          # by version so it never accidentally picks up a different QEMU.
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/mos-qemu-stage1:${{ steps.ver.outputs.qemu_version }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/mos-qemu-stage1:latest
          build-args: |
            QEMU_VERSION=${{ steps.ver.outputs.qemu_version }}
          cache-from: type=gha,scope=stage1
          cache-to: type=gha,scope=stage1,mode=max

      - name: Print resolved tags
        run: |
          echo "Pushed:"
          echo "  ${{ env.REGISTRY }}/${{ env.OWNER }}/mos-qemu-stage1:${{ steps.ver.outputs.qemu_version }}"
          echo "  ${{ env.REGISTRY }}/${{ env.OWNER }}/mos-qemu-stage1:latest"
